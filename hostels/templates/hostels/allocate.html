{% extends 'base.html' %}
{% block title %}Allocate Bed{% endblock %}
{% block page_header %}
<div class="flex flex-col md:flex-row md:items-center justify-between gap-8 mb-4">
    <div class="space-y-2">
        <h1 class="text-4xl font-black text-slate-900 tracking-tight flex items-center gap-4">
            <div class="w-3 h-12 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-200"></div>
            Allocate Student Bed
        </h1>
        <p class="text-slate-500 font-black text-[10px] uppercase tracking-[0.3em]">Hostel Assignments</p>
    </div>
    <a href="{% url 'hostels:dashboard' %}" class="px-6 py-3 bg-white text-indigo-600 border border-indigo-100 rounded-xl hover:bg-indigo-50 font-black text-xs uppercase tracking-widest shadow-sm transition-all">
        <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
    </a>
</div>
{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
        <div class="p-8 border-b border-slate-100 flex items-center gap-4">
            <div class="w-1.5 h-6 bg-indigo-600 rounded-full"></div>
            <h3 class="text-lg font-black text-slate-900">New Bed Allocation</h3>
        </div>
        <form method="post" class="p-8 space-y-6">
            {% csrf_token %}
            
            <div class="space-y-3">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Select Boarding Student</label>
                <select name="student_id" required class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-300 rounded-[1.5rem] text-sm font-bold text-slate-900 appearance-none focus:border-indigo-500 outline-none transition-all cursor-pointer shadow-inner">
                    <option value="" disabled selected>Search & Select Student...</option>
                    {% for student in students %}
                    <option value="{{ student.id }}">{{ student.get_full_name }} ({{ student.adm_no }})</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="space-y-3">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Available Bed</label>
                <select name="bed_id" required class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-300 rounded-[1.5rem] text-sm font-bold text-slate-900 appearance-none focus:border-indigo-500 outline-none transition-all cursor-pointer shadow-inner">
                    <option value="" disabled selected>Select an empty bed...</option>
                    {% for bed in beds %}
                    <option value="{{ bed.id }}">{{ bed.room.block.name }} - Room {{ bed.room.room_number }} - Bed {{ bed.bed_number }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="pt-6 border-t border-slate-100">
                <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all active:scale-95">
                    Confirm Allocation
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
