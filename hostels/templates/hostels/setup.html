{% extends 'base.html' %}
{% block title %}Setup Hostels{% endblock %}
{% block page_header %}
<div class="flex flex-col md:flex-row md:items-center justify-between gap-8 mb-4">
    <div class="space-y-2">
        <h1 class="text-4xl font-black text-slate-900 tracking-tight flex items-center gap-4">
            <div class="w-3 h-12 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-200"></div>
            Hostel Setup
        </h1>
        <p class="text-slate-500 font-black text-[10px] uppercase tracking-[0.3em]">Configure Blocks & Rooms</p>
    </div>
    <a href="{% url 'hostels:dashboard' %}" class="px-6 py-3 bg-white text-indigo-600 border border-indigo-100 rounded-xl hover:bg-indigo-50 font-black text-xs uppercase tracking-widest shadow-sm transition-all">
        <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
    </a>
</div>
{% endblock %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
    <!-- Add Block -->
    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
        <div class="p-8 border-b border-slate-100 flex items-center gap-4">
            <div class="w-1.5 h-6 bg-indigo-600 rounded-full"></div>
            <h3 class="text-lg font-black text-slate-900">Add New Block</h3>
        </div>
        <form method="post" class="p-8 space-y-6">
            {% csrf_token %}
            <input type="hidden" name="action" value="add_block">
            
            <div class="space-y-3">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Block Name</label>
                <input type="text" name="name" required class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-300 rounded-[1.5rem] text-sm font-bold text-slate-900 focus:border-indigo-500 outline-none transition-all shadow-inner">
            </div>
            
            <div class="space-y-3">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Gender Type</label>
                <select name="gender_type" required class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-300 rounded-[1.5rem] text-sm font-bold text-slate-900 appearance-none focus:border-indigo-500 outline-none transition-all cursor-pointer shadow-inner">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="mixed">Mixed</option>
                </select>
            </div>
            
            <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all active:scale-95">
                Save Block
            </button>
        </form>
    </div>

    <!-- Add Rooms -->
    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
        <div class="p-8 border-b border-slate-100 flex items-center gap-4">
            <div class="w-1.5 h-6 bg-indigo-600 rounded-full"></div>
            <h3 class="text-lg font-black text-slate-900">Add Room & Beds</h3>
        </div>
        <form method="post" class="p-8 space-y-6">
            {% csrf_token %}
            <input type="hidden" name="action" value="add_room">
            
            <div class="space-y-3">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Select Block</label>
                <select name="block_id" required class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-300 rounded-[1.5rem] text-sm font-bold text-slate-900 appearance-none focus:border-indigo-500 outline-none transition-all cursor-pointer shadow-inner">
                    <option value="" disabled selected>Select a Block...</option>
                    {% for block in blocks %}
                    <option value="{{ block.id }}">{{ block.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="space-y-3">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Room Number</label>
                <input type="text" name="room_number" required class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-300 rounded-[1.5rem] text-sm font-bold text-slate-900 focus:border-indigo-500 outline-none transition-all shadow-inner">
            </div>
            
            <div class="space-y-3">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Bed Capacity</label>
                <input type="number" name="capacity" min="1" value="4" required class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-300 rounded-[1.5rem] text-sm font-bold text-slate-900 focus:border-indigo-500 outline-none transition-all shadow-inner">
            </div>
            
            <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all active:scale-95">
                Create Room & Beds
            </button>
        </form>
    </div>
</div>
{% endblock %}
