{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Excel SMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            background-attachment: fixed;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-[420px] w-full">
        <!-- Logo Header -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-indigo-600 shadow-2xl mx-auto mb-6 ring-8 ring-white/20">
                <i class="fas fa-graduation-cap text-2xl"></i>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight font-outfit">Excel SMS</h1>
            <p class="text-indigo-100 text-sm font-medium mt-2">School Management Portal</p>
        </div>

        <!-- Login Card -->
        <div class="login-card rounded-[24px] shadow-2xl p-10 relative overflow-hidden">
            <div class="mb-8 text-center">
                <h2 class="text-2xl font-black text-slate-900 tracking-tight font-outfit">Welcome Back</h2>
                <p class="text-sm font-medium text-slate-500 mt-1">Please log in to your account</p>
            </div>

            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="p-4 bg-red-50 border border-red-100 rounded-xl flex items-center gap-3 text-red-600">
                    <i class="fas fa-circle-exclamation text-sm"></i>
                    <p class="text-xs font-bold">Invalid phone number or password.</p>
                </div>
                {% endif %}

                <div class="space-y-2">
                    <label for="id_username" class="block text-xs font-bold text-slate-700 ml-1">Phone Number</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-600 transition-colors">
                            <i class="fas fa-phone text-sm"></i>
                        </div>
                        <input type="tel" name="username" id="id_username" required 
                               class="w-full h-12 pl-11 pr-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-600 transition-all"
                               placeholder="2547XXXXXXXX">
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <label for="id_password" class="block text-xs font-bold text-slate-700">Password</label>
                        <a href="{% url 'users:password_reset' %}" class="text-[10px] font-bold text-indigo-600 hover:text-indigo-800 uppercase tracking-widest">Forgot?</a>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-600 transition-colors">
                            <i class="fas fa-lock text-sm"></i>
                        </div>
                        <input type="password" name="password" id="id_password" required 
                               class="w-full h-12 pl-11 pr-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-600 transition-all"
                               placeholder="••••••••••••">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full h-12 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-black text-sm shadow-xl shadow-indigo-200 transition-all active:scale-[0.98] flex items-center justify-center gap-3 group">
                        <span>Log In</span>
                        <i class="fas fa-arrow-right text-xs transform group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100 text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    Secure Access System
                </p>
            </div>
        </div>

        <p class="text-center mt-8 text-xs font-bold text-indigo-100/60">
            &copy; {% now "Y" %} Excel School Management System
        </p>
    </div>
</body>
</html>
