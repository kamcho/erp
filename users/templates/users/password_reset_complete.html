{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete - Excel SMS{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 text-center">
    <div class="glass-card animate-in fade-in slide-in-from-bottom-4 duration-700">
        <div class="w-20 h-20 bg-emerald-50 dark:bg-emerald-900/30 rounded-full flex items-center justify-center text-emerald-600 dark:text-emerald-400 mx-auto mb-6 shadow-lg shadow-emerald-500/10">
            <i class="fas fa-check-circle text-3xl"></i>
        </div>
        
        <h1 class="text-2xl font-black text-slate-900 dark:text-white tracking-tight mb-4">Password Changed!</h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed mb-8">
            Your password has been set successfully. You can now log in with your new credentials.
        </p>

        <a href="{% url 'users:login' %}" class="btn btn-primary w-full justify-center py-4 text-sm shadow-xl shadow-indigo-500/20 group">
            Log In Now
            <i class="fas fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
        </a>
    </div>
</div>
{% endblock %}
