{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Password - Excel SMS{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="glass-card animate-in fade-in slide-in-from-bottom-4 duration-700">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-indigo-50 dark:bg-indigo-900/30 rounded-2xl flex items-center justify-center text-indigo-600 dark:text-indigo-400 mx-auto mb-4">
                <i class="fas fa-key text-2xl"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-900 dark:text-white tracking-tight">Forgot Password?</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Enter your email address below and we'll send you a link to reset your password.</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="id_email" class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-slate-400 text-sm"></i>
                    </div>
                    <input type="email" name="email" id="id_email" required
                           class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none text-sm font-bold text-slate-700 dark:text-slate-200 placeholder:text-slate-400"
                           placeholder="your@email.com">
                </div>
            </div>

            <button type="submit" class="w-full btn btn-primary justify-center py-4 text-sm shadow-xl shadow-indigo-500/20">
                Send Reset Link
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
            <a href="{% url 'users:login' %}" class="text-xs font-bold text-slate-400 hover:text-indigo-500 transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
